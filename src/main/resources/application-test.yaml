spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  mail:
    host: localhost
    port: 9999

jwt:
  secret: test-secret
  expiration: 86400000

logging:
  level:
    org.springframework.boot.test: DEBUG